#
# Builds the Docusaurus website from the skigen repo and deploys it
# to GitHub Pages on skigen-project.github.io.

name: Deploy Website

on:
  repository_dispatch:
    types: [deploy-website]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skigen repo
        uses: actions/checkout@v4
        with:
          repository: skigen-project/skigen

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: doc/website/package-lock.json

      - name: Install dependencies
        working-directory: doc/website
        run: npm ci

      - name: Build
        working-directory: doc/website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
